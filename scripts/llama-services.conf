# llama-services.conf — parameters for scripts/llama-services.sh
#
# Sourced by the shell script (bash) and parsed/rewritten by
# scripts/switch-endpoints.py. Keep it to simple KEY=VALUE lines so both
# can handle it. Comments and blank lines are preserved by the Python
# rewriter; inline comments after values are not.
#
# Defaults in llama-services.sh cover every variable here, so missing
# keys fall back to the committed defaults rather than erroring.

# --- Chat server (port 8080) ----------------------------------------------
# HF spec (repo:quant) or local path (leading '/'). Passed as -hf / -m.
CHAT_HF_SPEC="unsloth/Qwen3.6-35B-A3B-GGUF:UD-Q4_K_XL"
# Alias the server advertises in /v1/models; must match what Honcho/Hermes
# set as `model` in their configs.
CHAT_ALIAS="qwen3.6-test"
# Context window. Must be <= the model's trained ctx (n_ctx_train).
CHAT_CTX=131072
# GPU layers to offload. 99 = all. Lower for partial offload.
CHAT_NGL=99
# 1 = add `-ot "ffn_(up|down|gate)_exps=CPU"` (MoE expert CPU offload).
# 0 = dense model, omit the flag.
CHAT_IS_MOE=1
# 1 = add `--reasoning off` (qwen3 family suppresses thinking tokens).
# 0 = omit the flag.
CHAT_REASONING_OFF=1
# Number of concurrent slots the server accepts (--parallel).
CHAT_PARALLEL=2

# --- Gatekeeper classifier (called by scripts/gatekeeper_daemon.py) -------
# Base URL (no /v1 suffix — the daemon appends /v1/chat/completions itself).
# Default points at the local chat llama-server; switch-endpoints.py keeps
# this in sync with the Honcho chat endpoint so the gk classifier follows
# the active chat engine (consistency). To pin the classifier to a dedicated
# lightweight model instead, hand-edit the two keys below and never let the
# switcher run Axis A again (or live with it rewriting this on the next run).
GK_LLM_URL="http://localhost:8080"
# Model alias / id the gk daemon sends in its OpenAI-compat request.
GK_LLM_MODEL="qwen3.6-test"

# --- Embedding server (port 8081) -----------------------------------------
# Path to the GGUF blob for the embedding model.
EMBED_BLOB="/usr/share/ollama/.ollama/models/blobs/sha256-970aa74c0a90ef7482477cf803618e776e173c007bf957f635f1015bfcfef0e6"
# Alias advertised in /v1/models. Honcho's hardcoded OpenAI-compat client
# resolves "openai/text-embedding-3-small" — keep it as that alias unless
# you are also updating Honcho's embedding code path.
EMBED_ALIAS="openai/text-embedding-3-small"
# GPU layers for the embedding server. 99 = all.
EMBED_NGL=99
